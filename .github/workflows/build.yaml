name: Build and push image

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  pull_request:
    paths:
      - Dockerfile
      - entrypoint.sh
      - requirements.txt
      - pulumi/**
      - scripts/**
      - manifests/**
      - helpers/**
      - .github/workflows/build.yaml
  workflow_dispatch:

env:
  IMAGE: sinanozel/k3s-anywhere

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.version.outputs.version }}
      tags:    ${{ steps.version.outputs.tags }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history + tags, required to derive the version

      - name: Compute version
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            # Release build: the pushed tag is the version.
            VERSION="${GITHUB_REF#refs/tags/v}"
            if [[ "${VERSION}" == *-* ]]; then
              # Pre-release tag (e.g. v0.2.0-rc.1): exact tag only.
              TAGS="${IMAGE}:${VERSION}"
            else
              TAGS="${IMAGE}:${VERSION},${IMAGE}:${VERSION%.*},${IMAGE}:latest"
            fi
          else
            # Dev build: next patch after the last release tag, dev-numbered
            # by commits since that tag. Pure function of repo state — no
            # write-back, nothing to race, rebuilds of a commit are idempotent.
            LAST=$(git describe --tags --abbrev=0 --match 'v[0-9]*.[0-9]*.[0-9]*' 2>/dev/null || true)
            if [ -n "${LAST}" ]; then
              BASE="${LAST#v}"; BASE="${BASE%%-*}" # drop any pre-release suffix
              IFS=. read -r MAJOR MINOR PATCH <<< "${BASE}"
              NEXT="${MAJOR}.${MINOR}.$((PATCH + 1))"
              COUNT=$(git rev-list "${LAST}..HEAD" --count)
            else
              NEXT="0.1.0"
              COUNT=$(git rev-list HEAD --count)
            fi
            VERSION="${NEXT}-dev.${COUNT}"
            TAGS="${IMAGE}:${VERSION}"
          fi
          echo "Version: ${VERSION}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          load: true  # export to local Docker daemon for save; no registry credentials needed here
          push: false
          tags: ${{ steps.version.outputs.tags }}
          labels: |
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Save image artifact
        run: |
          docker save "${IMAGE}:${{ steps.version.outputs.version }}" \
            | gzip > "k3s-anywhere-${{ steps.version.outputs.version }}.tar.gz"

      - uses: actions/upload-artifact@v4
        with:
          name: k3s-anywhere-${{ steps.version.outputs.version }}
          path: k3s-anywhere-${{ steps.version.outputs.version }}.tar.gz
          retention-days: 7

  push:
    needs: build
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: k3s-anywhere-${{ needs.build.outputs.version }}

      - name: Load image
        run: docker load < "k3s-anywhere-${{ needs.build.outputs.version }}.tar.gz"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Check release tag is not already published
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION="${{ needs.build.outputs.version }}"
          if docker manifest inspect "${IMAGE}:${VERSION}" >/dev/null 2>&1; then
            echo "::error::${IMAGE}:${VERSION} already exists on Docker Hub." \
                 "Release tags are write-once; cut a new version instead."
            exit 1
          fi

      - name: Push tags
        run: |
          PRIMARY="${IMAGE}:${{ needs.build.outputs.version }}"
          for TAG in $(echo "${{ needs.build.outputs.tags }}" | tr ',' '\n'); do
            [ "$TAG" = "$PRIMARY" ] || docker tag "$PRIMARY" "$TAG"
            docker push "$TAG"
          done
