name: k3s cluster

on:
  workflow_call:
    inputs:
      provider:
        required: true
        type: string
      config:
        required: true
        type: string
        description: "Base config path without extension (e.g. configs/my-cluster)"
      provider_config:
        required: false
        type: string
        default: ""
        description: >
          Provider-specific config path without extension
          (e.g. configs/aws/my-cluster-us-east-1). Required for AWS (AWS_REGION)
          and Exoscale (EXOSCALE_ZONE). Variables here override the base config.
      action:
        required: true
        type: string
      sops_age_recipient:
        required: false
        type: string
        default: ""
        description: >
          age public key to encrypt the cluster output artifact before upload.
          If provided, output/<cluster-name>.json is encrypted with sops and
          uploaded as <cluster-name>.json.enc. Generate a keypair with age-keygen;
          store the private key as SOPS_AGE_KEY in your repo secrets for decryption.
      image:
        required: false
        type: string
        default: "sinanozel/k3s-anywhere:0.1.5"
        description: >
          Provisioner image to run. Pin this to match the workflow ref you are
          calling — e.g. @v0.1.0 should use sinanozel/k3s-anywhere:0.1.0.
          Defaults to :latest, which is only published on stable releases.
    outputs:
      cluster_name:
        value: ${{ jobs.run.outputs.cluster_name }}
    secrets:
      EXOSCALE_API_KEY:
        required: false
      EXOSCALE_API_SECRET:
        required: false
      AWS_ACCESS_KEY_ID:
        required: false
      AWS_SECRET_ACCESS_KEY:
        required: false
      PULUMI_CONFIG_PASSPHRASE:
        required: true
      STATE_BUCKET_NAME:
        required: true

jobs:
  run:
    runs-on: ubuntu-latest
    outputs:
      cluster_name: ${{ steps.load-config.outputs.cluster_name }}

    steps:
      - uses: actions/checkout@v4

      - name: Validate inputs
        run: |
          error() { echo "::error::$1"; exit 1; }
          [ -n "${{ inputs.provider }}" ] || error "provider is required."
          [ -n "${{ inputs.config }}"   ] || error "config is required."
          [ -n "${{ inputs.action }}"   ] || error "action is required."
          [ "${{ inputs.action }}" != "setup" ] \
            || error "ACTION=setup creates IAM credentials and must be run locally with admin credentials, never in CI. See README → First-time setup."
          [ "${{ inputs.action }}" != "decommission" ] \
            || error "ACTION=decommission deletes IAM credentials and must be run locally with admin credentials, never in CI. See README → Purging the setup."
          [ -f "${{ inputs.config }}.env" ] \
            || error "Config file ${{ inputs.config }}.env not found."
          if [ -n "${{ inputs.provider_config }}" ]; then
            [ -f "${{ inputs.provider_config }}.env" ] \
              || error "Provider config file ${{ inputs.provider_config }}.env not found."
          fi

      - name: Load config
        id: load-config
        run: |
          grep -v '^#' "${{ inputs.config }}.env" | grep '=' >> "$GITHUB_ENV"
          if [ -n "${{ inputs.provider_config }}" ]; then
            grep -v '^#' "${{ inputs.provider_config }}.env" | grep '=' >> "$GITHUB_ENV"
          fi
          CLUSTER_NAME=$(grep '^CLUSTER_NAME=' "${{ inputs.config }}.env" | cut -d= -f2)
          echo "cluster_name=${CLUSTER_NAME}" >> "$GITHUB_OUTPUT"

      - name: Create output directory
        run: mkdir -p output

      - name: Run provisioner
        run: |
          PROVIDER_ENV_ARG=""
          if [ -n "${{ inputs.provider_config }}" ]; then
            PROVIDER_ENV_ARG="--env-file ${{ inputs.provider_config }}.env"
          fi
          docker run --rm \
            --env-file "${{ inputs.config }}.env" \
            ${PROVIDER_ENV_ARG} \
            -e ACTION="${{ inputs.action }}" \
            -e PROVIDER="${{ inputs.provider }}" \
            -e PULUMI_CONFIG_PASSPHRASE="${{ secrets.PULUMI_CONFIG_PASSPHRASE }}" \
            -e STATE_BUCKET_NAME="${{ secrets.STATE_BUCKET_NAME }}" \
            -e EXOSCALE_API_KEY="${{ secrets.EXOSCALE_API_KEY }}" \
            -e EXOSCALE_API_SECRET="${{ secrets.EXOSCALE_API_SECRET }}" \
            -e AWS_ACCESS_KEY_ID="${{ secrets.AWS_ACCESS_KEY_ID }}" \
            -e AWS_SECRET_ACCESS_KEY="${{ secrets.AWS_SECRET_ACCESS_KEY }}" \
            -v "${{ github.workspace }}/output:/app/output" \
            "${{ inputs.image }}"

      - name: Install sops and age
        if: inputs.action == 'provision' && inputs.sops_age_recipient != ''
        run: |
          AGE_VERSION="1.2.1"
          SOPS_VERSION="3.10.2"
          curl -fsSL \
            "https://github.com/FiloSottile/age/releases/download/v${AGE_VERSION}/age-v${AGE_VERSION}-linux-amd64.tar.gz" \
            | tar -xz -C /usr/local/bin --strip-components=1 age/age age/age-keygen
          curl -fsSL \
            "https://github.com/getsops/sops/releases/download/v${SOPS_VERSION}/sops-v${SOPS_VERSION}.linux.amd64" \
            -o /usr/local/bin/sops
          chmod +x /usr/local/bin/sops

      - name: Encrypt cluster output
        if: inputs.action == 'provision' && inputs.sops_age_recipient != ''
        env:
          SOPS_AGE_RECIPIENTS: ${{ inputs.sops_age_recipient }}
        run: |
          sops --encrypt \
            "output/${{ steps.load-config.outputs.cluster_name }}.json" \
            > "output/${{ steps.load-config.outputs.cluster_name }}.json.enc"

      - name: Upload cluster output
        if: inputs.action == 'provision' && inputs.sops_age_recipient == ''
        uses: actions/upload-artifact@v4
        with:
          name: cluster-output-${{ steps.load-config.outputs.cluster_name }}
          path: output/${{ steps.load-config.outputs.cluster_name }}.json
          retention-days: 7

      - name: Upload cluster output (encrypted)
        if: inputs.action == 'provision' && inputs.sops_age_recipient != ''
        uses: actions/upload-artifact@v4
        with:
          name: cluster-output-${{ steps.load-config.outputs.cluster_name }}
          path: output/${{ steps.load-config.outputs.cluster_name }}.json.enc
          retention-days: 7
